openapi: 3.1.0
info:
  title: Swagger Petstore - OpenAPI 3.1
  version: 1.0.12
paths:
  /post:
    get:
      summary: Create a pet.
      description: Create a pet.
      operationId: postPet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Color'
              enum:
                - black
                - white
      responses:
        '200':
          description: Successful operation
components:
  schemas:
    Color:
      type: string
      enum:
        - black