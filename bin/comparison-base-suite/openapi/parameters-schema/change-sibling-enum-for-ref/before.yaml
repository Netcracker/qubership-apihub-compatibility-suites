openapi: 3.1.0
info:
  title: Swagger Petstore - OpenAPI 3.1
  version: 1.0.12
paths:
  /pet:
    get:
      summary: Get an existing pet.
      description: Get an existing pet by Id.
      operationId: getPet
      parameters:
        - name: param1
          in: query
          schema:
            $ref: '#/components/schemas/Color'
            enum:
              - black
              - white
      responses:
        '200':
          description: Successful operation
components:
  schemas:
    Color:
      type: string
      enum:
        - black