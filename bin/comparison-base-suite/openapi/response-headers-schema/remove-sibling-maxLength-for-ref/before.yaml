openapi: 3.1.0
info:
  title: Swagger Petstore - OpenAPI 3.1
  version: 1.0.12
paths:
  /pet:
    get:
      summary: Get an existing pet.
      description: Get an existing pet by Id.
      operationId: getPet
      responses:
        "200":
          description: Successful operation
          headers:
            X-Header-1:
              schema:
                $ref: "#/components/schemas/Color"
                maxLength: 10
components:
  schemas:
    Color:
      type: string
      maxLength: 20
