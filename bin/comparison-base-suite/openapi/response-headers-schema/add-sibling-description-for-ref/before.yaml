openapi: 3.1.0
info:
  title: Swagger Petstore - OpenAPI 3.1
  version: 1.0.12
paths:
  /path1:
    post:
      summary: Get an existing pet.
      description: Get an existing pet by Id.
      operationId: getPet
      responses:
        '200':
          description: Successful operation
          headers:
            X-Header-1:
              schema:
                $ref: '#/components/schemas/Pet'
components:
  schemas:
    Pet:
      description: schema description from components
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: doggie